<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Maker Website</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" />

  <style>
    body {
      background-color: #555D50;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .heading-section {
      text-align: center;
      margin-top: 50px;
      margin-bottom: 40px;
    }

    .heading-section h1 {
      font-size: 2.5rem;
      font-weight: 600;
      color: #091623;
    }

    .heading-section p {
      font-size: 1.1rem;
      color: #021e37;
      margin-top: 10px;
    }

    .card {
      border: none;
      border-radius: 12px;
      transition: transform 0.3s ease;
      background-color: #ffffff;
      box-shadow: 0 8px 16px rgba(0,0,0,0.06);
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      border-radius: 12px;
      max-width: 100%;
      height: auto;
      cursor: pointer;
    }

    .card-title {
      text-align: center;
      font-weight: 500;
      margin-top: 10px;
      color: #6F00FF;
      font-weight: bold;
    }

    .container-custom {
      max-width: 1000px;
      margin: auto;
    }

    @media (max-width: 768px) {
      .card-title {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container container-custom">
    <div class="heading-section">
      <h1>🧩 Select Your Portfolio Design</h1>
      <p>Click on a design to start building your professional portfolio</p>
    </div>

    <div class="row">
      {% for i in range(1, 7) %}
        <div class="col-md-6 mb-4">
          <div class="card">
            <a href="{{ url_for('form1', template='design' ~ i) }}">
              <img src="/static/design{{ i }}.png" alt="Design {{ i }}">
            </a>
            <div class="card-body">
              <h5 class="card-title">Design {{ i }}</h5>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>

  <!-- Optional JS -->
  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"></script>
</body>
</html>
