<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Maker Website</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" />

  <style>
    body {
      background-color: #555D50;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #f1f1f1;
    }

    h1, h4, h6, label {
      color: #ffffff;
    }

    .container {
      max-width: 700px;
      margin-top: 50px;
      background-color: #2d2f31;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .btn-primary {
      background-color: #6F00FF;
      border-color: #6F00FF;
    }

    .btn-primary:hover {
      background-color: #5600cc;
      border-color: #5600cc;
    }

    .form-control, .custom-file-input, .form-check-input {
      background-color: #eee;
    }

    .form-section {
      margin-bottom: 30px;
    }

    .input-group-text {
      background-color: #6F00FF;
      color: #fff;
      border: none;
    }

    .custom-file-label {
      background-color: #eee;
    }

    .form-check-label {
      color: #ccc;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="text-center mb-4">📋 Fill Your Details</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">

      <!-- Personal Details -->
      <div id="personal" class="form-section">
        <h4>Personal Details</h4>
        <div class="form-group">
          <label for="firstname">First Name</label>
          <input type="text" name="firstname" class="form-control" id="firstname" placeholder="John" required>
        </div>
        <div class="form-group">
          <label for="lastname">Last Name</label>
          <input type="text" name="lastname" class="form-control" id="lastname" placeholder="wick" required>
        </div>

        <div class="form-group">
          <h6>Upload Profile Picture</h6>
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text">Choose File</span>
            </div>
            <div class="custom-file">
              <input type="file" accept="image/*" class="custom-file-input" name="dp" required>
              <label class="custom-file-label">Upload profile photo</label>
            </div>
          </div>
        </div><br>

        <button class="btn btn-primary" onclick="tostep2()">Next</button>
      </div>

      <!-- Educational Details -->
      <div id="education" class="form-section" style="display: none;">
        <h4>Educational Details</h4>
        <div class="form-group">
          <label for="school">School</label>
          <input type="text" name="school" class="form-control" id="school" placeholder="Your school name" required>
        </div>
        <div class="form-group">
          <label for="college">College</label>
          <input type="text" name="college" class="form-control" id="college" placeholder="your college name" required>
        </div>
        <div class="form-group">
          <label for="course">Course</label>
          <input type="text" name="course" class="form-control" id="course" placeholder="Write course name you are opting for" required>
        </div>
        <br>
        <button class="btn btn-light" onclick="tobackstep1()">Back</button>
        <button class="btn btn-primary" onclick="tostep3()">Next</button>
      </div>

      <!-- Contact Details -->
      <div id="contact" class="form-section" style="display: none;">
        <h4>Contact Details</h4>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="number" name="phone" class="form-control" id="phone" placeholder="write ten digit phone no." required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" name="email" class="form-control" id="email" placeholder="yourEmail@email.com" required>
        </div>
        <div class="form-group">
          <label for="text">Github</label>
          <input type="text" name="git" class="form-control" id="git" placeholder="Paste your Github link" required>
        </div>
        <div class="form-group">
          <label for="text">Linkedin</label>
          <input type="text" name="linkedin" class="form-control" id="linkedin" placeholder="Paste your Linkedin URL" required>
        </div>
        <br>
        <button class="btn btn-light" onclick="tobackstep2()">Back</button>
        <button class="btn btn-primary" onclick="tostep4()">Next</button>
      </div>

      <!-- Skills & About -->
      <div id="skills" class="form-section" style="display: none;">
        <h4>About You</h4>
        <div class="form-group">
          <label for="skill1">Skill 1</label>
          <input type="text" name="skill1" class="form-control" id="skill1" placeholder="your Domain of working.." required>
        </div>
        <div class="form-group">
          <label for="skill2">Skill 2</label>
          <input type="text" name="skill2" class="form-control" placeholder="other tech skils.." id="skill2">
        </div>
        <div class="form-group">
          <label for="skill3">Skill 3</label>
          <input type="text" name="skill3" class="form-control" id="skill3" placeholder="soft skills..">
        </div>
        <div class="form-group">
          <label for="about">About You</label>
          <textarea name="about" class="form-control" id="about" rows="4" placeholder="Write about yourself in approx 4,5 lines.." ></textarea>
        </div>

        <div class="form-group form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1" required>
          <label class="form-check-label" for="exampleCheck1">I confirm that all details are accurate</label>
        </div><br>

        <button class="btn btn-light" onclick="tobackstep3()">Back</button>
        <button type="submit" class="btn btn-success">Submit</button>
      </div>
    </form>
  </div>

  <!-- Script for Navigation -->
  <script>
    function tostep2() {
      event.preventDefault();
      document.getElementById("personal").style.display = "none";
      document.getElementById("education").style.display = "block";
    }
    function tostep3() {
      event.preventDefault();
      document.getElementById("education").style.display = "none";
      document.getElementById("contact").style.display = "block";
    }
    function tostep4() {
      event.preventDefault();
      document.getElementById("contact").style.display = "none";
      document.getElementById("skills").style.display = "block";
    }
    function tobackstep1() {
      event.preventDefault();
      document.getElementById("education").style.display = "none";
      document.getElementById("personal").style.display = "block";
    }
    function tobackstep2() {
      event.preventDefault();
      document.getElementById("contact").style.display = "none";
      document.getElementById("education").style.display = "block";
    }
    function tobackstep3() {
      event.preventDefault();
      document.getElementById("skills").style.display = "none";
      document.getElementById("contact").style.display = "block";
    }
  </script>
</body>
</html>
