<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Maker Website</title>
  <link rel="icon" href="static/icon2.png">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #555D50;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .hero-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1.2s ease-in-out;
      max-width: 650px;
      width: 90%;
    }

    .hero-container img.logo {
      width: 90px;
      height: 90px;
      margin-bottom: 20px;
      animation: slideDown 0.8s ease-in-out;
    }

    .hero-container h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .hero-container p {
      font-size: 1.1rem;
      color: #ddd;
      margin-bottom: 35px;
      animation: fadeIn 1.6s ease-in-out;
    }

    .start-btn {
      background-color: #6F00FF;
      color: #fff;
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.3s ease;
      animation: fadeInUp 1.4s ease-in-out;
      text-decoration: none;
    }

    .start-btn:hover {
      background-color: #8AB9F1;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 576px) {
      .hero-container h1 {
        font-size: 2rem;
      }

      .hero-container p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="hero-container">
    <img src="{{ url_for('static', filename='icon2.png') }}" alt="Logo" class="logo">
    <h1>Portfolio Maker</h1>
    <p>Craft your personalized portfolio in minutes — quick, clean, and professional</p>
    <a href="{{ url_for('design') }}" class="start-btn">Start Building</a>
  </div>

  <!-- Optional JS -->
  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
